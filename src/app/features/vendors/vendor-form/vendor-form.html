<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>{{ isEditMode ? 'Edit Vendor' : 'Add Vendor' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="vendorForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Vendor Name</mat-label>
          <input matInput formControlName="name">
          <mat-error>Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
          <mat-error>Valid email is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contact Person</mat-label>
          <input matInput formControlName="contactPerson">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-col">
          <mat-label>Address</mat-label>
          <textarea matInput formControlName="address" rows="3"></textarea>
        </mat-form-field>
      </div>

      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

      <div class="form-actions">
        <button mat-button type="button" routerLink="/vendors">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="vendorForm.invalid || loading">
          {{ loading ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
