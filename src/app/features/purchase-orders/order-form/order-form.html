<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>New Purchase Order</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="orderForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Vendor</mat-label>
          <mat-select formControlName="vendorId">
            <mat-option *ngFor="let v of vendors" [value]="v.id">{{ v.name }}</mat-option>
          </mat-select>
          <mat-error>Vendor is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Required Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="requiredDate">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-col">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="2"></textarea>
        </mat-form-field>
      </div>

      <h3>Order Items</h3>
      <div formArrayName="items">
        <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="item-row">
          <mat-form-field appearance="outline">
            <mat-label>Item Name</mat-label>
            <input matInput formControlName="itemName">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Unit</mat-label>
            <input matInput formControlName="unit">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" formControlName="quantity">
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Unit Price</mat-label>
            <input matInput type="number" formControlName="unitPrice">
          </mat-form-field>
          <button mat-icon-button color="warn" type="button" (click)="removeItem(i)">
            <mat-icon>remove_circle</mat-icon>
          </button>
        </div>
      </div>
      <button mat-stroked-button type="button" (click)="addItem()">
        <mat-icon>add</mat-icon> Add Item
      </button>

      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

      <div class="form-actions">
        <button mat-button type="button" routerLink="/purchase-orders">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="orderForm.invalid || loading">
          {{ loading ? 'Creating...' : 'Create Order' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
